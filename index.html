    <style>
        @font-face {
            font-family: 'Anton';
            src: url('Anton-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body, h3, h4 { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
        }
        
        h1, h2, .font-serif { 
            font-family: 'Anton', sans-serif !important; 
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .modal-overlay { background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px); }
        
        .bg-home {
            background: linear-gradient(rgba(2, 6, 23, 0.9), rgba(15, 23, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-attachment: fixed;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* Hide scrollbar for horizontal avatar bar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-link { transition: all 0.3s ease; }

        .nav-active { color: white !important; border-bottom: 2px solid white; }

        .bar {
            background: #3b82f6;
            width: 3px;
            margin: 0 1px;
            animation: equalize 1s infinite alternate;
        }
        @keyframes equalize {
            0% { height: 5px; }
            100% { height: 20px; }
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes notebookReveal {
            0% { 
                clip-path: polygon(0% 100%, 50% 100%, 100% 100%, 50% 100%); 
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            100% { 
                clip-path: polygon(-50% -50%, 150% -50%, 150% 150%, -50% 150%); 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        .anim-notebook-reveal { 
            animation: notebookReveal 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }
    </style>
</head>

                                <img src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&q=80&w=800" className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 group-hover:scale-110" />

                <div className="mt-48 w-full max-w-7xl bg-white/5 border border-white/10 rounded-[4rem] p-16 md:p-32 text-center backdrop-blur-sm relative overflow-hidden group">
                    <div className="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-1000" />
                    <h2 className="text-5xl md:text-7xl font-black text-white uppercase tracking-tighter mb-10 relative">Enter the Collective</h2>

                        <button onClick={() => setPage('contact')} className="border border-white/20 text-white px-16 py-6 rounded-2xl font-black uppercase text-[10px] tracking-[0.3em] hover:bg-white/10 transition-all">Contact the Author</button>

        const HomeCard = ({ title, subtitle, onClick, img, color = "slate" }) => (

                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent" />
                <div className="absolute bottom-10 left-10">

        const SidebarLayout = ({ title, list, type, setDetail }) => {

                active: 'bg-emerald-500/10 text-emerald-500'

            if (!creator) return <div className={`min-h-screen pt-20 ${theme.bg} flex items-center justify-center`}>Loading Archive...</div>;

            return (

                    </aside>
                    {/* Mobile/Tablet Avatar Bar */}
                    <div className="lg:hidden flex overflow-x-auto p-6 gap-6 no-scrollbar border-b border-white/5 bg-black/40 sticky top-20 z-[80]">
                        {list.map(item => (
                            <button key={item.id} onClick={() => setActiveId(item.id)} className={`flex-shrink-0 flex flex-col items-center gap-2 group`}>
                                <img src={item.avatar} className={`w-14 h-14 rounded-2xl object-cover transition-all duration-300 ${activeId === item.id ? 'ring-2 ring-blue-500 scale-110 grayscale-0' : 'grayscale opacity-40'}`} />
                                <span className={`text-[8px] font-black uppercase tracking-widest ${activeId === item.id ? 'text-white' : 'text-white/20'}`}>{item.name}</span>
                            </button>
                        ))}
                    </div>
                    <main className="flex-1 p-6 lg:p-20">
                        <div className="flex flex-col lg:flex-row items-center gap-6 lg:gap-10 mb-12 lg:mb-20 text-center lg:text-left">
                            <img src={creator.avatar} className="w-32 lg:w-48 h-32 lg:h-48 rounded-[2.5rem] lg:rounded-[3.5rem] object-cover grayscale border-4 border-white/5 shadow-2xl" />
                            <div>
                                <h1 className="text-7xl font-black text-white mb-2 uppercase tracking-tighter">{creator.name}</h1>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {works.map(work => (
                                <div key={work.id} onClick={() => setDetail(work)} className={`bg-white/5 p-8 rounded-[3rem] group cursor-pointer border border-white/5 ${theme.border} transition-all flex flex-col justify-between h-64`}>
                                    <div>
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="text-[9px] font-black uppercase tracking-widest px-3 py-1 bg-white/5 rounded-full text-white/40">{work.type}</span>
                                        </div>
                                        <h3 className="text-2xl font-black text-white uppercase tracking-tighter leading-none">{work.title}</h3>
                                    </div>
                                    <p className="text-slate-500 text-[10px] uppercase font-black tracking-widest">Retrieve Artifact</p>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarItem = ({ item, isActive, onClick, theme }) => (
            <button onClick={onClick} className={`w-full text-left p-6 rounded-[2rem] transition-all flex items-center gap-4 ${isActive ? `${theme.active} shadow-xl` : 'text-white/40 hover:text-white'}`}>
                <img src={item.avatar} className="w-8 h-8 rounded-full object-cover grayscale" />
                <span className="font-black text-xs uppercase tracking-widest">{item.name}</span>
            </button>
        );

        const TreeClimber = () => {
            const canvasRef = React.useRef(null);
            const [gameState, setGameState] = useState('menu');
            const [score, setScore] = useState(0);
            const [ui, setUi] = useState({ title: 'TREE CLIMBER', sub: 'Avoid the fruit!', btn: 'START' });
            const touchSide = React.useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let state = 'menu';
                let curScore = 0;
                let speed = 3;
                let frameCount = 0;
                const treeW = 140;
                const treeX = (canvas.width - treeW) / 2;
                const player = { x: 185, y: 520, w: 30, h: 40, dx: 0, speed: 6 };
                let fruits = [];
                let audioCtx;

                const playSfx = (f, type, d, v = 0.05) => {
                    if (!audioCtx) return;
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = type;
                    o.frequency.setValueAtTime(f, audioCtx.currentTime);
                    g.gain.setValueAtTime(v, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(); o.stop(audioCtx.currentTime + d);
                };

                const keys = {};
                const kd = (e) => keys[e.code] = true;
                const ku = (e) => keys[e.code] = false;
                window.addEventListener('keydown', kd);
                window.addEventListener('keyup', ku);

                window._startGame = () => {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    curScore = 0; setScore(0); speed = 3; frameCount = 0; fruits = [];
                    player.x = 185; state = 'playing'; setGameState('playing');
                };

                const update = () => {
                    if (state !== 'playing') return;
                    frameCount++;
                    player.dx = 0;
                    if (keys['ArrowLeft'] || touchSide.current === 'left') player.dx = -player.speed;
                    if (keys['ArrowRight'] || touchSide.current === 'right') player.dx = player.speed;
                    player.x += player.dx;
                    if (player.dx !== 0 && frameCount % 12 === 0) {
                        playSfx(400 + Math.random() * 50, 'sine', 0.05, 0.02);
                    }

                    player.x = Math.max(treeX, Math.min(player.x, treeX + treeW - player.w));
                    if (frameCount % 60 === 0) { 
                        curScore++; setScore(curScore); 
                        playSfx(800 + Math.random() * 40, 'triangle', 0.1, 0.03);
                    }
                    if (frameCount % 600 === 0) speed += 0.5;
                    if (frameCount % Math.max(20, 50 - Math.floor(curScore/10)) === 0) {
                        fruits.push({ x: treeX + Math.random()*(treeW-20), y: -20, r: 10 + Math.random()*10 });
                    }
                    for (let i = fruits.length - 1; i >= 0; i--) {
                        fruits[i].y += speed + 2;
                        let f = fruits[i];
                        if (f.x < player.x + player.w && f.x + f.r > player.x && f.y < player.y + player.h && f.y + f.r > player.y) {
                            state = 'over'; setGameState('over');
                            playSfx(60, 'sawtooth', 0.8, 0.15);
                            setUi({ title: 'GAME OVER', sub: `${curScore} meters climbed`, btn: 'RETRY' });
                        }
                        if (f.y > 600) fruits.splice(i, 1);
                    }
                };

                const draw = () => {
                    ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, 400, 600);
                    ctx.fillStyle = '#5D4037'; ctx.fillRect(treeX, 0, treeW, 600);
                    ctx.fillStyle = '#4E342E'; ctx.fillRect(treeX + 20, 0, 8, 600); ctx.fillRect(treeX + 110, 0, 8, 600);
                    ctx.fillStyle = '#FFEB3B'; ctx.fillRect(player.x, player.y, player.w, player.h);
                    ctx.fillStyle = '#000'; ctx.fillRect(player.x+5, player.y+8, 5, 5); ctx.fillRect(player.x+20, player.y+8, 5, 5);
                    ctx.fillStyle = '#F44336'; fruits.forEach(f => { ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill(); });
                    requestAnimationFrame(draw);
                };

                const tick = setInterval(update, 1000/60);
                const anim = requestAnimationFrame(draw);
                return () => { clearInterval(tick); cancelAnimationFrame(anim); window.removeEventListener('keydown', kd); window.removeEventListener('keyup', ku); delete window._startGame; };
            }, []);

            return (
                <div className="relative w-full h-full bg-sky-400 font-mono overflow-hidden">
                    <canvas ref={canvasRef} width="400" height="600" className="w-full h-full object-contain" />
                    {gameState !== 'playing' && (
                        <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-white text-4xl font-black mb-2 uppercase">{ui.title}</h2>
                            <p className="text-white/70 mb-8 uppercase text-xs tracking-widest">{ui.sub}</p>
                            <button onClick={() => window._startGame?.()} className="bg-emerald-500 border-4 border-white text-white px-10 py-4 font-black hover:bg-emerald-600 transition-all">
                                {ui.btn}
                            </button>
                        </div>
                    )}
                    {gameState === 'playing' && (
                        <>
                            <div className="absolute top-8 left-8 text-white text-3xl font-black drop-shadow-lg">{score}m</div>
                            <div className="absolute bottom-10 left-0 right-0 flex justify-between px-10 pointer-events-none">
                                <div onMouseDown={() => touchSide.current = 'left'} onMouseUp={() => touchSide.current = null} onTouchStart={(e) => { e.preventDefault(); touchSide.current = 'left'; }} onTouchEnd={() => touchSide.current = null} className="w-20 h-20 bg-white/20 border-4 border-white/40 rounded-full flex items-center justify-center text-white font-black pointer-events-auto active:bg-white/40 cursor-pointer select-none">L</div>
                                <div onMouseDown={() => touchSide.current = 'right'} onMouseUp={() => touchSide.current = null} onTouchStart={(e) => { e.preventDefault(); touchSide.current = 'right'; }} onTouchEnd={() => touchSide.current = null} className="w-20 h-20 bg-white/20 border-4 border-white/40 rounded-full flex items-center justify-center text-white font-black pointer-events-auto active:bg-white/40 cursor-pointer select-none">R</div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const PigeonSimulator = () => {
            const canvasRef = React.useRef(null);
            const [status, setStatus] = useState('menu');
            const [results, setResults] = useState(null);
            const stats = React.useRef({ speed: 0, alt: 0, windSpd: 0, windDir: 0, totalSpeed: 0, frames: 0 });

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animFrame;
                let startTime;
                const duration = 30000; // 30 seconds
                const logicalSize = 100; // 100 logical units
                const scale = 400 / logicalSize; // Map to 400px canvas

                const birdClasses = [
                    { type: 'Scout', speedBase: 0.08, alt: 150, color: '#10b981' },
                    { type: 'Heavy', speedBase: 0.04, alt: 80, color: '#f43f5e' },
                    { type: 'Messenger', speedBase: 0.06, alt: 120, color: '#f59e0b' }
                ];

                const startPos = { x: Math.random() * logicalSize, y: Math.random() * logicalSize };

                const birds = Array.from({ length: 10 }, (_, i) => ({
                    id: i,
                    class: birdClasses[i % 3], // Cycles through Scout, Heavy, Messenger
                    x: startPos.x,
                    y: startPos.y,
                    targetX: Math.random() * logicalSize,
                    targetY: Math.random() * logicalSize,
                    finished: false,
                    totalSpeed: 0,
                    frameCount: 0
                }));

                const scenery = Array.from({ length: 12 }, () => ({
                    x: Math.random() * logicalSize,
                    y: Math.random() * logicalSize,
                    type: Math.random() > 0.5 ? 'building' : 'tree',
                    size: 2 + Math.random() * 4,
                    height: 50 + Math.floor(Math.random() * 150)
                }));

                // Wind Grid
                const windField = Array.from({ length: 5 }, () => 
                    Array.from({ length: 5 }, () => ({
                        angle: Math.random() * Math.PI * 2,
                        strength: 0.2 + Math.random() * 0.8
                    }))
                );

                const getWind = (x, y) => {
                    const gx = Math.min(4, Math.max(0, Math.floor(x / 20)));
                    const gy = Math.min(4, Math.max(0, Math.floor(y / 20)));
                    return windField[gx][gy];
                };

                const loop = (now) => {
                    if (!startTime) startTime = now;
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    ctx.clearRect(0, 0, 400, 400);
                    ctx.fillStyle = '#020617'; // Square map background
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.strokeStyle = '#1e293b';
                    ctx.strokeRect(0, 0, 400, 400);

                    // Draw Wind Tracker Grid
                    for(let i=0; i<5; i++) {
                        for(let j=0; j<5; j++) {
                            const w = windField[i][j];
                            const cx = (i * 20 + 10) * scale;
                            const cy = (j * 20 + 10) * scale;
                            ctx.beginPath();
                            ctx.strokeStyle = '#1e293b';
                            ctx.moveTo(cx, cy);
                            ctx.lineTo(cx + Math.cos(w.angle) * 8, cy + Math.sin(w.angle) * 8);
                            ctx.stroke();
                        }
                    }

                    scenery.forEach(s => {
                        ctx.strokeStyle = s.type === 'building' ? '#475569' : '#065f46';
                        if(s.type === 'building') {
                            ctx.strokeRect((s.x - s.size/2) * scale, (s.y - s.size/2) * scale, s.size * scale, s.size * scale);
                        } else {
                            ctx.beginPath(); ctx.arc(s.x * scale, s.y * scale, (s.size/2) * scale, 0, Math.PI*2); ctx.stroke();
                        }
                    });

                    // Draw Destinations as dots
                    birds.forEach(b => {
                        ctx.fillStyle = b.class.color;
                        ctx.beginPath();
                        ctx.arc(b.targetX * scale, b.targetY * scale, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = b.class.color;
                        ctx.strokeRect((b.targetX - 2) * scale, (b.targetY - 2) * scale, 4 * scale, 4 * scale);
                    });

                    // Departure Point Symbol
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect((startPos.x - 2) * scale, (startPos.y - 2) * scale, 4 * scale, 4 * scale);
                    ctx.strokeStyle = '#ffffff';
                    ctx.strokeRect((startPos.x - 3) * scale, (startPos.y - 3) * scale, 6 * scale, 6 * scale);

                    let avgSpeedSum = 0;
                    birds.forEach(b => {
                        if (b.finished) return;

                        const wind = getWind(b.x, b.y);
                        const angleToTarget = Math.atan2(b.targetY - b.y, b.targetX - b.x);
                        
                        const baseStep = b.class.speedBase;
                        const vx = Math.cos(angleToTarget) * baseStep + Math.cos(wind.angle) * wind.strength * 0.05;
                        const vy = Math.sin(angleToTarget) * baseStep + Math.sin(wind.angle) * wind.strength * 0.05;

                        b.x += vx;
                        b.y += vy;

                        b.totalSpeed += baseStep;
                        b.frameCount++;

                        const dist = Math.hypot(b.targetX - b.x, b.targetY - b.y);
                        if (dist < 1) b.finished = true;

                        ctx.save();
                        ctx.translate(b.x * scale, b.y * scale);
                        ctx.rotate(angleToTarget);
                        ctx.fillStyle = b.class.color;
                        ctx.beginPath();
                        ctx.moveTo(6, 0); ctx.lineTo(-4, -4); ctx.lineTo(-4, 4);
                        ctx.fill();
                        ctx.restore();

                        avgSpeedSum += baseStep;
                    });

                    const currentWind = getWind(birds[0].x, birds[0].y);
                    stats.current.speed = avgSpeedSum / 10;
                    stats.current.alt = progress < 0.5 ? progress * 2 * birds[0].class.alt : (1 - progress) * 2 * birds[0].class.alt;
                    stats.current.windSpd = currentWind.strength * 10;
                    stats.current.frames++;

                    // Enhanced HUD
                    ctx.fillStyle = '#10b981';
                    ctx.font = '10px monospace';
                    ctx.fillText(`AVG VELOCITY: ${stats.current.speed.toFixed(4)}`, 20, 30);
                    ctx.fillText(`WIND FORCE: ${stats.current.windSpd.toFixed(4)}`, 20, 45);
                    ctx.fillText(`MAP MODE: 2D TOP-DOWN`, 280, 30);

                    ctx.fillRect(20, 380, progress * 360, 2);

                    if (progress < 1) {
                        animFrame = requestAnimationFrame(loop);
                    } else {
                        const birdStats = birds.map(b => ({
                            id: b.id + 1,
                            type: b.class.type,
                            avgSpeed: b.frameCount > 0 ? (b.totalSpeed / b.frameCount).toFixed(4) : "0.00",
                            finished: b.finished
                        }));
                        setResults(birdStats);
                        setStatus('finished');
                    }
                };

                if (status === 'playing') animFrame = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(animFrame);
            }, [status]);

            return (
                <div className="relative w-full h-full bg-slate-950 overflow-hidden rounded-[3rem]">
                    <canvas ref={canvasRef} width="400" height="400" className="w-full h-full" />
                    {status === 'menu' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/80 p-10 text-center">
                            <h2 className="text-emerald-500 text-3xl font-black mb-4 tracking-tighter uppercase">Pigeon Simulator v1.0</h2>
                            <p className="text-white/50 text-xs mb-8 uppercase tracking-widest leading-loose">Automated trajectory test.<br/>Destination: Sector 7G Archive.</p>
                            <button onClick={() => setStatus('playing')} className="bg-emerald-600 text-white px-8 py-3 font-black uppercase text-xs tracking-widest rounded-full">Initiate Flight</button>
                        </div>
                    )}
                    {status === 'finished' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-emerald-950/95 p-6 text-center overflow-y-auto custom-scrollbar">
                            <h2 className="text-white text-3xl font-black mb-4 uppercase tracking-tighter">Flight Manifest</h2>
                            <div className="w-full max-w-md space-y-2 mb-8">
                                <div className="flex justify-between text-[10px] font-black uppercase text-emerald-400 border-b border-white/10 pb-2">
                                    <span>Bird</span>
                                    <span>Class</span>
                                    <span>Avg Vel</span>
                                    <span>Status</span>
                                </div>
                                {results && results.map(b => (
                                    <div key={b.id} className="flex justify-between text-[11px] font-mono text-white/80 border-b border-white/5 py-1">
                                        <span>#{b.id}</span>
                                        <span>{b.type}</span>
                                        <span>{b.avgSpeed}</span>
                                        <span className={b.finished ? "text-emerald-400" : "text-rose-500"}>
                                            {b.finished ? "ARRIVED" : "MIA"}
                                        </span>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => { setStatus('menu'); setResults(null); }} className="border border-white/20 text-white px-8 py-3 font-black uppercase text-xs tracking-widest rounded-full hover:bg-white/10">Reboot Sim</button>
                        </div>
                    )}
                </div>
            );
        };

        const WorkDetail = ({ work }) => {
            const isGame = work.id === 'g1' || work.id === 'g2';
            return (
                <div className={isGame ? "flex flex-col gap-12" : "grid lg:grid-cols-2 gap-20"}>
                    <div className={`${isGame ? "w-full h-[500px] md:h-[600px]" : "aspect-square"} bg-slate-900 rounded-[4rem] border border-white/10 flex items-center justify-center overflow-hidden shadow-2xl relative`}>
                    {!isGame && <div className="w-full h-full overflow-y-auto p-4 custom-scrollbar">
                        <div className="flex flex-col gap-4">
                            {(work.media || (work.content || work.type === 'Audio' ? [{ type: work.type, content: work.content }] : [])).map((m, i) => (
                                <div key={i} className="w-full aspect-video rounded-3xl overflow-hidden border border-white/5 bg-black/20 relative shrink-0">

        const ContactPage = () => (
            <div className="min-h-screen pt-40 px-10 pb-20 bg-slate-950 flex flex-col items-center">
                <div className="max-w-4xl text-center">
                    <h1 className="text-8xl font-black text-white mb-10 uppercase tracking-tighter">Contact J. Soon Livan</h1>
                    <p className="text-xl text-slate-400 mb-12 font-light leading-relaxed">
                        Secure communication channels for professional inquiries, collaborative ventures, and structural support.
                    </p>

                    <div className="mb-20 p-10 bg-blue-500/5 border border-blue-500/10 rounded-[3rem]">
                        <h3 className="text-blue-500 font-black uppercase text-[10px] tracking-[0.4em] mb-4">Strategic Collaboration</h3>
                        <p className="text-slate-300 text-lg font-light leading-relaxed">
                            The archive is entering its next phase. Any support or expertise in <span className="text-white font-medium underline decoration-blue-500/50">Publication</span>, <span className="text-white font-medium underline decoration-blue-500/50">Marketing</span>, <span className="text-white font-medium underline decoration-blue-500/50">Distribution</span>, and <span className="text-white font-medium underline decoration-blue-500/50">License Clearance</span> would be highly appreciated.

                            <span className="font-black text-xs uppercase tracking-widest">Coming Soon</span>

                            <span className="font-black text-xs uppercase tracking-widest">Coming Soon</span>
                        </a>
                    </div>
                </div>
            </div>

            <div className="min-h-screen pt-40 px-10 pb-20 bg-slate-950">

                        <h1 className="text-8xl font-black text-white mb-10 uppercase tracking-tighter">About Mooters, Mooteds and Moots</h1>
                        <p className="text-xl text-slate-400 leading-relaxed font-light mb-12">
                            Mooters, Mooteds and Moots is an urban science-supernatural 11 novel series with 3 distinct arcs following three different groups, written by J. Soon Livan, the pen name of Joseph Liu.
                        </p>
                        <p className="text-xl text-slate-400 leading-relaxed font-light mb-12">
                            <b>1. Mitchell Grose's ...</b>A teaching poet, Children's author and spoken performer realises his look-alikes all across the country gives undesirable perceptions of him. He better find out what, and why before everybody shuts him out.
                        </p>
                        <p className="text-xl text-slate-400 leading-relaxed font-light mb-12">
                            <b>2. Playing with DeCandyAmir...</b>creates and spreads twisted narratives of series, people, objects and places, with WithTheFootage, he and his 'Moots' create narrative 'havoc' with his mates around the world.
                        </p>

                            <b>3. A Sampling...</b> Cuisine, the Electronic DJ group and 'Ter-Cribbing, the masked Urban producer and rapper's journies from obtaining sounds and 'Mooting' these sounds/content to get their message across. However, both have heat, legally and criminally.
                        </p>
                        <p className="text-xl text-slate-400 leading-relaxed font-light mb-12">
                            <b>3A. Cuisine</b> - Electronic Musician, first creating music with obscure media nobody wants to find out anymore, bring them recognition and these media to the world. A collaboration with 'Ter-Cribbing leads to a new album, a new perspective, and new outlooks at people.
                        </p>
                        <p className="text-xl text-slate-400 leading-relaxed font-light mb-12">
                            <b>3B. 'Ter-Cribbing</b> - Urban Producer and Rapper, 'Mooting' sounds and content to create music with a message. With the help of Cuisine, he creates a new album that brings new perspectives and outlooks at people, but also brings heat to him legally and criminally. Could he pass the heat?
                        </p>
                        <p className="text-xl text-slate-400 leading-relaxed font-light mb-12">

                    </div>
                </div>

                            alt="Mooters, Mooteds and Moots - Logo"

            const [selectedStore, setSelectedStore] = useState(null);

            useEffect(() => {

                return () => clearTimeout(timer);

                switch(currentPage) {
                    case 'home': return <Home setPage={setPage} />;
                    case 'mters': return <SidebarLayout title="CREATORS" list={MTERS} type="mters" setDetail={setSelectedWork} />;
                    case 'mted': return <SidebarLayout title="ORIGINS" list={MTED} type="mted" setDetail={setSelectedWork} />;
                    case 'mts': return <MootsPage />;
                    case 'news': return <NewsPage setDetail={setSelectedNews} />;

                                <div key={idx} className="w-full aspect-video rounded-[3rem] overflow-hidden border border-white/10 bg-black/20 relative">

                                        <div className="w-full h-full relative group">
                                            <img src={m.content} className="w-full h-full object-cover grayscale" />

                    </div>
                </div>
            </div>

            const [selectedEntity, setSelectedEntity] = useState(null);

                                                            {['Characters'].map(cat => (
                                                                <div key={cat} className="space-y-2">
                                                                    <h4 className="text-[8px] font-black text-amber-500/40 uppercase tracking-[0.3em]">{cat}</h4>
                                                                    {(project[cat.toLowerCase()] || []).map(item => (
                                                                        <button 
                                                                            key={item.id} 
                                                                            onClick={() => setSelectedEntity({ ...item, category: cat })} 
                                                                            className={`block text-[10px] transition-colors pl-2 border-l py-1 w-full text-left ${selectedEntity?.id === item.id ? 'text-amber-400 border-amber-400 font-bold' : 'text-white/40 border-white/5 hover:text-white hover:border-white/20'}`}
                                                                        >
                                                                            {item.name}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 p-6 lg:p-20 overflow-y-auto">
                        {!selectedEntity ? (
                            <div className="h-full flex flex-col">
                                <div className="lg:hidden space-y-4">
                                    {!openCreator ? (
                                        MTERS.map(m => (
                                            <button key={m.id} onClick={() => setOpenCreator(m.id)} className="w-full p-8 bg-white/5 rounded-[2rem] border border-white/5 flex items-center justify-between group">
                                                <span className="text-2xl font-black text-white uppercase tracking-tighter">{m.name}</span>
                                                <Icon name="ChevronRight" className="text-amber-500" />
                                            </button>
                                        ))
                                    ) : !openProject ? (
                                        WORKS_DATABASE[openCreator]?.map(p => (
                                            <button key={p.id} onClick={() => setOpenProject(p.id)} className="w-full p-8 bg-white/5 rounded-[2rem] border border-white/5 flex items-center justify-between">
                                                <span className="text-2xl font-black text-white uppercase tracking-tighter">{p.title}</span>
                                                <Icon name="ChevronRight" className="text-amber-500" />
                                            </button>
                                        ))
                                    ) : (
                                        currentProject?.characters?.map(c => (
                                            <button key={c.id} onClick={() => setSelectedEntity({ ...c, category: 'Characters' })} className="w-full p-8 bg-white/5 rounded-[2rem] border border-white/5 flex items-center justify-between">
                                                <span className="text-2xl font-black text-white uppercase tracking-tighter">{c.name}</span>
                                                <Icon name="ChevronRight" className="text-amber-500" />
                                            </button>
                                        ))
                                    )}
                                </div>
                                <div className="hidden lg:flex flex-col items-center justify-center h-full text-center opacity-70">
                                    <Icon name="ChevronRight" className="w-20 h-20 text-amber-600 mb-8 animate-pulse" />
                                    <h1 className="text-4xl font-black text-amber-600 uppercase tracking-tighter">Find out a Moot by selecting one on the left.</h1>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-4xl mx-auto fade-in">
                                <div className="mb-12">
                                    <div className="flex items-center gap-3 mb-6">
                                        <span className="px-3 py-1 bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[9px] font-black uppercase tracking-widest rounded-full">{selectedEntity.category}</span>
                                        <div className="h-px flex-1 bg-amber-500/10" />
                                    </div>
                                    <h1 className="text-7xl font-black text-white uppercase tracking-tighter mb-4">{selectedEntity.name}</h1>
                                    <p className="text-amber-500/80 font-black uppercase text-xs tracking-[0.3em]">{selectedEntity.role || selectedEntity.base || selectedEntity.style || selectedEntity.type}</p>
                                </div>

                                {(selectedEntity.media || selectedEntity.img || selectedEntity.content) && (
                                    <div className="flex flex-col gap-6 mb-12">
                                        {(selectedEntity.media || [{ type: selectedEntity.type || 'Art', content: selectedEntity.img || selectedEntity.content }]).map((m, i) => (
                                            <div key={i} className="rounded-[3.5rem] overflow-hidden border border-white/5 bg-slate-900 aspect-video shadow-2xl relative">
                                                {(m.type === 'Art' || m.type === 'Video' || m.type === 'Film') && m.content && (
                                                    <div className="w-full h-full relative group">
                                                        <img src={m.content} className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000" />
                                                        {(m.type === 'Video' || m.type === 'Film') && (
                                                            <div className="absolute inset-0 flex items-center justify-center bg-black/40">
                                                                <Icon name="Play" className="w-16 h-16 text-white" />
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                {m.type === 'Audio' && (
                                                    <div className="w-full h-full flex flex-col items-center justify-center p-12 bg-amber-500/5">
                                                        <div className="flex gap-2 items-end h-20 mb-8">
                                                            {[...Array(20)].map((_, j) => (
                                                                <div key={j} className="bar bg-amber-500" style={{ animationDelay: `${j * 0.05}s` }}></div>
                                                            ))}
                                                        </div>
                                                        <audio controls src={m.content} className="w-full max-w-xs h-8 opacity-40 hover:opacity-100 transition-opacity" />
                                                    </div>
                                                )}
                                                <div className="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-black/60 to-transparent pointer-events-none" />
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="bg-white/5 p-12 rounded-[3rem] border border-white/5 backdrop-blur-sm">
                                    <h3 className="text-white uppercase font-black text-[10px] mb-8 opacity-30 tracking-[0.4em]">Extracted Lore Data</h3>
                                    <p className="text-2xl text-amber-50 leading-relaxed font-light">
                                        {selectedEntity.details}
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
